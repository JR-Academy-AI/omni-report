name: Sync Marketing Tasks to Prod

# 见 PRD_MARKETING_TASKS_CI_SYNC.md
# omni-report 是 marketing-tasks .md 的 source of truth；
# 这个 workflow 把 active/*.md push 给 prod jr-academy backend，写进 Mongo。

on:
  push:
    branches: [main]
    paths:
      - 'marketing-tasks/active/**/*.md'
      - '.github/workflows/sync-marketing-tasks.yml'
  workflow_dispatch:
    # 手动兜底：首次全量 / Action 失败重试 / backend 升级后重新同步

concurrency:
  group: sync-marketing-tasks
  cancel-in-progress: false  # 串行执行，按 push 顺序，避免后写覆盖前写

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Build payload + POST to prod
        env:
          # 公司 org 公用 secret（与 jr-wiki / training-rag 同名）。
          # 之前用 JR_ACADEMY_PROD_API / JR_ACADEMY_SUPERADMIN_TOKEN 是定制名，2026-05-10 起
          # 那个 JWT 过期没人续，连挂 21 次。改用公用 ADMIN_TOKEN 后跟着 org 滚动续期。
          PROD_API: ${{ secrets.API_URL || 'https://api.jiangren.com.au' }}
          TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Missing ADMIN_TOKEN secret (org-level)"
            exit 1
          fi
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          (async () => {
            const dir = 'marketing-tasks/active';
            if (!fs.existsSync(dir)) {
              console.log(`No ${dir} directory; nothing to sync`);
              return;
            }

            const tasks = fs.readdirSync(dir)
              .filter(f => f.endsWith('.md'))
              .map(f => ({
                filename: f,
                rawMarkdown: fs.readFileSync(path.join(dir, f), 'utf-8')
              }));

            if (tasks.length === 0) {
              console.log('No .md files in active/; nothing to sync');
              return;
            }

            console.log(`Posting ${tasks.length} tasks to ${process.env.PROD_API}/admin-cms/marketing-tasks/sync/import`);

            const res = await fetch(
              `${process.env.PROD_API}/admin-cms/marketing-tasks/sync/import`,
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.TOKEN}`
                },
                body: JSON.stringify({ tasks, strategy: 'upsert' })
              }
            );

            const text = await res.text();
            let json;
            try {
              json = JSON.parse(text);
            } catch {
              console.error(`Non-JSON response (HTTP ${res.status}): ${text.slice(0, 500)}`);
              process.exit(1);
            }

            console.log(JSON.stringify(json, null, 2));

            if (!res.ok || !json.success) {
              console.error(`::error::Sync failed: HTTP ${res.status}`);
              process.exit(1);
            }

            const totalProcessed = (json.created ?? 0) + (json.updated ?? 0);
            const errorCount = json.errors?.length ?? 0;

            if (errorCount > 0) {
              // Partial success: 主路径成功 + 部分卡 frontmatter 不合规 → ::warning::
              // 全部失败：created+updated == 0 且 errors > 0 → ::error:: + exit 1
              if (totalProcessed === 0) {
                console.error(`::error::All ${errorCount} task(s) failed validation`);
                process.exit(1);
              } else {
                console.warn(`::warning::Partial success: ${totalProcessed} synced, ${errorCount} failed validation (see errors[] above)`);
                console.warn('Failed cards stay in active/ for fix-and-retry; main payload reached prod Mongo.');
              }
            }
            console.log(`OK created=${json.created} updated=${json.updated} skippedInvalid=${json.skippedInvalid} errors=${errorCount}`);
          })().catch(err => {
            console.error(`::error::${err.message}`);
            process.exit(1);
          });
          EOF
